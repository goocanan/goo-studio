services:
  # Backend API
  - type: web
    name: goo-studio-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Supabase connection string in Render dashboard
      - key: FRONTEND_URL
        fromService:
          type: static
          name: goo-studio-frontend
          property: host
      - key: BETTER_AUTH_SECRET
        sync: false # Generate a random secret and set it in Render dashboard
      - key: BETTER_AUTH_URL
        fromService:
          type: web
          name: goo-studio-api
          property: host
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: static
    name: goo-studio-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: goo-studio-api
          property: host
